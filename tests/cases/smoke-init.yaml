id: smoke_init
suite: smoke
purpose: verify init creates the contracted project skeleton and a valid manifest
fixture: empty
steps:
  - name: init_project
    timeout_sec: 240
    prompt: |
      $novel init 创建一本赛博修仙小说《霓虹飞升》，项目 slug 必须是 neon-ascension。
      只做项目初始化，不要继续 brief、bible、outline 或正文写作。
    expect:
      files_exist:
        - projects/neon-ascension/project_manifest.yaml
      dirs_exist:
        - projects/neon-ascension/01_brief
        - projects/neon-ascension/02_bible
        - projects/neon-ascension/03_outline
        - projects/neon-ascension/04_manuscript
        - projects/neon-ascension/05_state
        - projects/neon-ascension/06_reports
        - projects/neon-ascension/07_exports
      validators:
        - manifest_contract
